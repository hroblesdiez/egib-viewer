[build]
  publish = "."
  command = ""

[[edge_functions]]
  path     = "/wfs-proxy"
  function = "wfs-proxy"

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self' https: http: data: blob: 'unsafe-inline' 'unsafe-eval'"
    X-Frame-Options          = "DENY"
    X-Content-Type-Options   = "nosniff"
