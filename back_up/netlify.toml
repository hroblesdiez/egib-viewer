[build]
  publish = "."
  command = ""
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# Redirect all requests to index.html (single-page app behaviour)
[[redirects]]
  from = "/*"
  to   = "/index.html"
  status = 200

# Allow the browser to call external WFS services and the CORS proxy
[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self' https: http: data: blob: 'unsafe-inline' 'unsafe-eval'"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
